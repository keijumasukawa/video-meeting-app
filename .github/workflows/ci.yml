name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v6

      - name: Node.js のセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Turborepo キャッシュの復元
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: テスト
        run: pnpm test

      - name: ビルド
        run: pnpm build
